<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Experiences | Discover Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Italiana&display=swap" rel="stylesheet">
<style>
:root{--black:#000;--white:#fff;--gold:#c59959}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#000;color:#fff}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.5rem 6%;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.08)}
.nav-container{max-width:1900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.nav-brand{display:flex;align-items:center;gap:1rem;text-decoration:none}
.nav-logo-img{font-size:2rem}
.nav-logo-text{font-family:Italiana,serif;font-size:1.5rem;color:#000;letter-spacing:4px}
.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;margin-top:88px}
.hero-title{font-family:Italiana,serif;font-size:clamp(4rem,10vw,8rem);letter-spacing:12px;margin-bottom:3rem}
.experiences-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;max-width:1900px;margin:0 auto;padding:0 6% 6rem}
.exp-card{aspect-ratio:1;position:relative;overflow:hidden;cursor:pointer;transition:all .4s ease}
.exp-card:hover{transform:scale(1.05);z-index:10}
.exp-image{width:100%;height:100%;object-fit:cover;filter:grayscale(40%);transition:all .5s ease}
.exp-card:hover .exp-image{filter:grayscale(0%) brightness(1.1);transform:scale(1.1)}
.exp-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%);display:flex;align-items:flex-end;padding:2rem}
.exp-title{font-family:Playfair Display,serif;font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase}
@media (max-width:1024px){.experiences-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:768px){.experiences-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-container">
        <a href="index.html" class="nav-brand">
            <div class="nav-logo-img">🌿</div>
            <div class="nav-logo-text">RWANDA</div>
        </a>
    </div>
</nav>

<section class="hero">
    <h1 class="hero-title">UNIQUE EXPERIENCES</h1>
</section>

<section class="experiences-grid">
    <a href="food-tours.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=800&q=80" alt="Food Tours" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Food Tours</h3>
        </div>
    </a>
    
    <a href="women-only-retreats.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=800&q=80" alt="Women-Only Retreats" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Women-Only Retreats</h3>
        </div>
    </a>
    
    <a href="luxury-rwanda.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1582719508461-905c673771fd?w=800&q=80" alt="Luxury Rwanda" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Luxury Rwanda</h3>
        </div>
    </a>
    
    <a href="living-the-culture.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1583225173988-3d9a1c5d90e5?w=800&q=80" alt="Living the Culture" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Living the Culture</h3>
        </div>
    </a>
    
    <a href="city-biking-walks.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1571068316344-75bc76f77890?w=800&q=80" alt="City Biking" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">City Biking & Night Walks</h3>
        </div>
    </a>
    
    <a href="coffee-experiences.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=800&q=80" alt="Coffee Experiences" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Coffee Experiences</h3>
        </div>
    </a>
    
    <a href="adventure-nature.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80" alt="Adventure & Nature" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Adventure & Nature</h3>
        </div>
    </a>
    
    <a href="akagera-night-safari.html" class="exp-card">
        <img src="https://images.unsplash.com/photo-1516426122078-c23e76319801?w=800&q=80" alt="Akagera Night Safari" class="exp-image">
        <div class="exp-overlay">
            <h3 class="exp-title">Akagera Night Safari</h3>
        </div>
    </a>
</section>

</body>
</html>
